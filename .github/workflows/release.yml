name: Release

# Build a .vsix on every push/PR (validation), and publish when a v* tag is pushed.
#
# Required repository secrets for publishing:
#   VSCE_PAT  - Personal Access Token for the VS Code Marketplace (required to publish)
#   OVSX_PAT  - (optional) Token for Open VSX; the Open VSX step is skipped if unset
#
# To cut a release:
#   1. bump "version" in package.json
#   2. git tag v2.1.0 && git push origin v2.1.0

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build .vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --out esx-legacy-snippets.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: esx-legacy-snippets-vsix
          path: '*.vsix'
          if-no-files-found: error

  publish:
    name: Publish to Marketplace
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --skip-duplicate

      - name: Publish to Open VSX (optional)
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish --skip-duplicate -p "$OVSX_PAT"
