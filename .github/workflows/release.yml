name: Release

# Build a .vsix on every push/PR (validation), and publish when a v* tag is pushed.
#
# Primary publish target: Open VSX (open-vsx.org) — the registry used by Cursor / VSCodium.
#
# Required repository secret for publishing:
#   OVSX_PAT  - Open VSX access token (create at https://open-vsx.org/user-settings/tokens)
# Optional:
#   VSCE_PAT  - VS Code Marketplace PAT; the Marketplace step is skipped if this secret is unset
#
# To cut a release (one-click):
#   1. bump "version" in package.json (e.g. 3.0.1) and update CHANGELOG.md
#   2. git tag v3.0.1 && git push origin v3.0.1

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build .vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --out extension.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: esx-legacy-snippets-vsix
          path: '*.vsix'
          if-no-files-found: error

  publish:
    name: Publish to Open VSX
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --out extension.vsix

      - name: Publish to Open VSX
        run: npx ovsx publish extension.vsix --skip-duplicate

      - name: Publish to VS Code Marketplace (optional)
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath extension.vsix --skip-duplicate
